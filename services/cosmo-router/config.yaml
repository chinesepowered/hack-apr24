# Cosmo Router config — loaded when the router container boots.
# Enables MCP Gateway + NATS streams for the Branch demo.
version: "1"

listen_addr: "0.0.0.0:3002"

# Serve the supergraph from a local JSON file instead of Cosmo Cloud CDN.
execution_config:
  file:
    path: "./supergraph.json"

# --- Storage providers (referenced by mcp.storage.provider_id below) ---
storage_providers:
  file_system:
    - id: mcp
      path: "./operations"

# --- MCP Gateway (Wundergraph Cosmo MCP) ---
mcp:
  enabled: true
  server:
    listen_addr: "0.0.0.0:5025"
  storage:
    provider_id: mcp
  graph_name: branch
  # Expose the full schema so MCP clients can explore and call any operation.
  # OK in a demo/internal context; disable in prod.
  expose_schema: true
  enable_arbitrary_operations: true
  exclude_mutations: false

# --- Cosmo Streams (NATS event provider) ---
events:
  providers:
    nats:
      - id: default
        url: "nats://nats:4222"

telemetry:
  service_name: "branch-cosmo-router"
  tracing:
    enabled: true
    exporters:
      - exporter: http
        endpoint: "http://jaeger:4318"
